name: Code Quality & Dependencies

on:
  push:
    branches:
      - main
      - mm/features
  pull_request:
    branches:
      - main
      - mm/features
  schedule:
    # Weekly dependency check on Monday at 1 AM UTC
    - cron: '0 1 * * 1'

jobs:
  dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && cd backend && npm ci

      - name: Audit dependencies
        run: |
          echo "Frontend audit:"
          npm audit --audit-level=high || true
          echo ""
          echo "Backend audit:"
          cd backend && npm audit --audit-level=high || true
        continue-on-error: true

      - name: Check for outdated packages
        run: |
          echo "Frontend outdated packages:"
          npm outdated || echo "All up to date"
          echo ""
          echo "Backend outdated packages:"
          cd backend && npm outdated || echo "All up to date"
        continue-on-error: true

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint on frontend
        run: |
          npm install -g eslint
          eslint src/ --format=json --output-file=eslint-results.json || true
        continue-on-error: true

      - name: Check code duplication
        run: |
          npm install -g jscpd
          jscpd src backend --threshold 0 || true
        continue-on-error: true

      - name: Check code coverage (if Jest configured)
        run: |
          npm test -- --coverage --watchAll=false || echo "Tests skipped"
        continue-on-error: true

  docker-security:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -f Dockerfile.backend -t shopops-backend:test .
          docker build -f Dockerfile.frontend -t shopops-frontend:test .

      - name: Run Trivy scan on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shopops-backend:test
          format: 'sarif'
          output: 'trivy-backend.sarif'
        continue-on-error: true

      - name: Run Trivy scan on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shopops-frontend:test
          format: 'sarif'
          output: 'trivy-frontend.sarif'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: |
            trivy-backend.sarif
            trivy-frontend.sarif
        continue-on-error: true

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install license-report
        run: npm install -g license-report

      - name: Check licenses (frontend)
        run: license-report --package=./package.json || true

      - name: Check licenses (backend)
        run: license-report --package=./backend/package.json || true
        continue-on-error: true
