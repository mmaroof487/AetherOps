name: ShopOps CI/CD Pipeline

on:
  push:
    branches: [main, mm/features]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, mm/features]
  schedule:
    - cron: '0 2 * * 0' # Weekly security scan (Sunday 2AM UTC)
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # 1. TEST BACKEND
  # ═══════════════════════════════════════════════════════════════════════════
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run tests
        run: npm test --if-present
        continue-on-error: true

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

  # ═══════════════════════════════════════════════════════════════════════════
  # 2. TEST FRONTEND
  # ═══════════════════════════════════════════════════════════════════════════
  test-frontend:
    name: 🧪 Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test --if-present || true
        continue-on-error: true

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

  # ═══════════════════════════════════════════════════════════════════════════
  # 3. CODE QUALITY & SECURITY SCAN
  # ═══════════════════════════════════════════════════════════════════════════
  code-quality:
    name: 🔍 Code Quality & Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && cd backend && npm ci

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Check for outdated packages
        run: |
          echo "Frontend:" && npm outdated || true
          echo "Backend:" && cd backend && npm outdated || true
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # 4. VALIDATE INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════════════
  validate-infra:
    name: 🏗️ Validate Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Validate Terraform (if present)
        run: |
          if [ -d "terraform" ] && ls terraform/*.tf 2>/dev/null; then
            cd terraform
            terraform init -backend=false
            terraform validate
            terraform fmt -check -recursive
            echo "✓ Terraform validated"
          else
            echo "✓ No Terraform files — skipping"
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Validate K8s manifests
        run: |
          if [ -d "k8s" ] && ls k8s/*.yaml 2>/dev/null; then
            kubectl apply -f k8s/ --dry-run=client
            echo "✓ K8s manifests validated"
          else
            echo "✓ No K8s manifests — skipping"
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # 5. BUILD DOCKER IMAGES
  # ═══════════════════════════════════════════════════════════════════════════
  build-docker:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose
        run: docker-compose config > /dev/null

  # ═══════════════════════════════════════════════════════════════════════════
  # 6. INTEGRATION TESTS
  # ═══════════════════════════════════════════════════════════════════════════
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && cd backend && npm ci

      - name: Start backend
        run: cd backend && npm start &
        env:
          OLLAMA_HOST: http://localhost:11434
          NODE_ENV: test

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "✓ Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "⚠ Backend did not start (may be expected without Ollama)"
        continue-on-error: true

      - name: Build frontend
        run: npm run build

  # ═══════════════════════════════════════════════════════════════════════════
  # PIPELINE SUMMARY
  # ═══════════════════════════════════════════════════════════════════════════
  summary:
    name: 📋 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, code-quality, validate-infra, build-docker, integration-tests]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 🚀 ShopOps Infra CI/CD Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.test-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs.test-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality & Security | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Infrastructure Validation | ${{ needs.validate-infra.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.build-docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
