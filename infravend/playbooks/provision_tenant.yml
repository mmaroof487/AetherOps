---
# ══════════════════════════════════════════════════════════════
# InfraVend — Ansible Playbook: Provision Tenant Docker Container
# Called by: vend.sh with tenant_id, port, biz_type variables
# ══════════════════════════════════════════════════════════════
- name: Provision Tenant Environment
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    tenant_id: "{{ tenant_id }}"
    tenant_port: "{{ tenant_port }}"
    biz_type: "{{ biz_type | default('store') }}"
    image: "nginx:alpine"
    s3_bucket: "infravend-templates-771969015644"

  tasks:
    - name: Pull base Docker image
      community.docker.docker_image:
        name: "{{ image }}"
        source: pull
      ignore_errors: true

    - name: Create tenant HTML content
      copy:
        dest: "/tmp/tenant_{{ tenant_id }}/index.html"
        content: |
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>{{ biz_type | capitalize }} — Powered by InfraVend</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: 'Segoe UI', sans-serif; background: #0A1628; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
              .badge { background: #D9A64822; border: 1px solid #D9A648; color: #D9A648; padding: 6px 18px; border-radius: 20px; font-size: 12px; font-weight: 700; letter-spacing: 1px; margin-bottom: 24px; }
              h1 { font-size: 42px; font-weight: 800; margin-bottom: 12px; }
              h1 span { color: #D9A648; }
              p { color: #7A9BB5; font-size: 16px; margin-bottom: 32px; max-width: 480px; text-align: center; line-height: 1.6; }
              .stats { display: flex; gap: 24px; margin-bottom: 40px; }
              .stat { background: #1A3A5C; border: 1px solid #1A3A5C; border-radius: 12px; padding: 16px 24px; text-align: center; }
              .stat-val { font-size: 22px; font-weight: 800; color: #D9A648; }
              .stat-label { font-size: 11px; color: #7A9BB5; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
              .tag { background: #2D8B5A22; border: 1px solid #2D8B5A; color: #2D8B5A; padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; }
              footer { margin-top: 60px; font-size: 11px; color: #3A5A7A; }
            </style>
          </head>
          <body>
            <div class="badge">⚡ INFRAVEND · TENANT: {{ tenant_id }}</div>
            <h1>Your <span>{{ biz_type | capitalize }}</span> is Live</h1>
            <p>Infrastructure provisioned automatically by InfraVend. Docker container running. Cloud-ready architecture deployed.</p>
            <div class="stats">
              <div class="stat"><div class="stat-val">🐳</div><div class="stat-label">Docker</div></div>
              <div class="stat"><div class="stat-val">☸️</div><div class="stat-label">Kubernetes</div></div>
              <div class="stat"><div class="stat-val">☁️</div><div class="stat-label">AWS S3</div></div>
              <div class="stat"><div class="stat-val">🤖</div><div class="stat-label">Ansible</div></div>
            </div>
            <div class="tag">✅ Provisioned at port {{ tenant_port }}</div>
            <footer>Powered by InfraVend · ShopOps Infra · CPPE Project</footer>
          </body>
          </html>
        force: yes
      become: false

    - name: Stop existing tenant container if running
      community.docker.docker_container:
        name: "tenant_{{ tenant_id }}"
        state: absent
        force_kill: true
      ignore_errors: true

    - name: Launch tenant Docker container
      community.docker.docker_container:
        name: "tenant_{{ tenant_id }}"
        image: "{{ image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ tenant_port }}:80"
        volumes:
          - "/tmp/tenant_{{ tenant_id }}:/usr/share/nginx/html:ro"
        labels:
          infravend: "true"
          tenant_id: "{{ tenant_id }}"
          biz_type: "{{ biz_type }}"

    - name: Wait for container to be healthy
      wait_for:
        host: localhost
        port: "{{ tenant_port }}"
        delay: 1
        timeout: 15

    - name: Save tenant record locally
      copy:
        dest: "/Users/ges/Desktop/CPPE_PROJECT/infravend/tenants/{{ tenant_id }}.json"
        content: |
          {
            "tenant_id": "{{ tenant_id }}",
            "biz_type": "{{ biz_type }}",
            "port": {{ tenant_port }},
            "url": "http://localhost:{{ tenant_port }}",
            "status": "live",
            "provisioned_at": "{{ ansible_date_time.iso8601 | default('now') }}"
          }

    - name: Upload tenant config to S3
      command: >
        aws s3 cp
        /Users/ges/Desktop/CPPE_PROJECT/infravend/tenants/{{ tenant_id }}.json
        s3://infravend-templates-771969015644/tenants/{{ tenant_id }}.json
      ignore_errors: true

    - name: Done
      debug:
        msg: "✅ Tenant {{ tenant_id }} live at http://localhost:{{ tenant_port }}"
