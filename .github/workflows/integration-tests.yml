name: Integration Tests

on:
  push:
    branches:
      - main
      - mm/features
  pull_request:
    branches:
      - main
      - mm/features
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      ollama:
        image: ollama/ollama:latest
        options: >-
          --health-cmd "curl -f http://localhost:11434/api/tags"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 3
        ports:
          - 11434:11434

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && cd backend && npm ci

      - name: Start backend
        run: cd backend && npm start &
        env:
          OLLAMA_HOST: http://localhost:11434
          NODE_ENV: test

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3001/api/health; then
              echo "✓ Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Test API endpoints
        run: |
          echo "Testing /api/health endpoint..."
          curl -f http://localhost:3001/api/health || exit 1
          
          echo "✓ Backend health check passed"

      - name: Test Frontend build
        run: npm run build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            dist/
          retention-days: 7

  docker-integration:
    name: Docker Compose Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker-compose build

      - name: Validate docker-compose
        run: docker-compose config > /dev/null

      - name: Check image layers
        run: |
          echo "Backend image size:"
          docker images | grep backend || echo "Image not found"
          echo "Frontend image size:"
          docker images | grep frontend || echo "Image not found"
