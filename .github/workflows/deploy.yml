name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Check if there are changes that warrant deployment
  check-changes:
    name: Check for Deployable Changes
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: check
        run: |
          if git diff-index --quiet HEAD~1 HEAD -- src/ backend/ docker-compose.yml Dockerfile.* 2>/dev/null || [ $? -eq 0 ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

  # Build production images
  build-prod:
    name: Build Production Images
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.deploy == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=prod-
            type=semver,pattern={{version}}

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=prod-
            type=semver,pattern={{version}}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy via docker-compose
  deploy-local:
    name: Deploy with Docker Compose
    runs-on: ubuntu-latest
    needs: build-prod
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Deploy via docker-compose
        run: |
          echo "🚀 Deployment Instructions:"
          echo ""
          echo "To deploy this release:"
          echo "1. SSH into your server"
          echo "2. Clone/pull latest: git clone ${{ github.server_url }}/${{ github.repository }}.git"
          echo "3. Pull latest images: docker-compose pull"
          echo "4. Start services: docker-compose up -d"
          echo "5. Verify: docker-compose ps"
          echo ""
          echo "Images are available at:"
          echo "  Backend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest"
          echo "  Frontend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest"

  # Notification
  notify:
    name: Send Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy-local
    if: always()
    steps:
      - name: Create deployment status
        run: |
          echo "## ✅ Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images:** " >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
